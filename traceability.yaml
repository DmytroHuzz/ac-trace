project_root: .
acceptance_criteria:
  - id: AC-1
    title: VIP discount at threshold
    description: VIP customers with a subtotal of at least 100 receive a 10% discount.
    code:
      - path: demo_api/services/pricing.py
        symbol: calculate_discount
        lines: "1-6"
        mutate: true
    tests:
      - path: tests/test_pricing.py
        cases:
          - test_vip_discount_applies_at_threshold
          - test_non_vip_customer_gets_no_discount

  - id: AC-2
    title: Shipping fee by speed
    description: Expedited shipping costs 15.0 and standard shipping costs 5.0.
    code:
      - path: demo_api/services/pricing.py
        symbol: calculate_shipping
        lines: "9-10"
        mutate: true
    tests:
      - path: tests/test_pricing.py
        cases:
          - test_expedited_shipping_fee
          - test_standard_shipping_fee

  - id: AC-3
    title: Quote API returns a cost breakdown
    description: POST /quote returns subtotal, discount, shipping, and total.
    code:
      - path: demo_api/services/pricing.py
        symbol: build_quote
        mutate: true
      - path: demo_api/app.py
        symbol: quote
        mutate: false
    tests:
      - path: tests/test_pricing.py
        cases:
          - test_build_quote_combines_discount_and_shipping
      - path: tests/test_api.py
        cases:
          - test_quote_endpoint_returns_breakdown

  - id: AC-4
    title: Health endpoint reports service status
    description: 'GET /health returns {"status": "ok"}.'
    code:
      - path: demo_api/app.py
        symbol: health
        mutate: false
    tests:
      - path: tests/test_api.py
        cases:
          - test_healthcheck
